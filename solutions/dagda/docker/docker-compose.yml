# Dagda — Phase 1 Media Stack
# https://github.com/lowflying/homeclaw
#
# First run:
#   1. cp .env.example .env  — fill in values
#   2. bash ../scripts/setup.sh
#   3. docker compose up -d
#
# Usage:
#   docker compose up -d          start all
#   docker compose down           stop all
#   docker compose logs -f [svc]  tail logs

name: dagda

services:

  # ─── INDEXERS ──────────────────────────────────────────────────────────────
  # Prowlarr manages torrent indexers and syncs them to Sonarr + Radarr.
  # Configure indexers here first, then connect Sonarr/Radarr via API key.
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: dagda_prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    networks:
      - dagda

  # ─── DOWNLOAD CLIENT ───────────────────────────────────────────────────────
  # Deluge handles torrent downloads. Sonarr/Radarr instruct it what to grab.
  # IMPORTANT: mounts the full MEDIA_ROOT so Sonarr/Radarr can hardlink files
  # (instant, no extra disk usage) instead of copying.
  deluge:
    image: lscr.io/linuxserver/deluge:latest
    container_name: dagda_deluge
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/deluge:/config
      - ${MEDIA_ROOT}:/media
    ports:
      - "8112:8112"       # web UI
      - "6881:6881"       # torrent TCP
      - "6881:6881/udp"   # torrent UDP
    restart: unless-stopped
    networks:
      - dagda

  # ─── TV SHOWS ──────────────────────────────────────────────────────────────
  # Sonarr monitors RSS feeds, grabs episodes, renames and sorts them.
  # In Sonarr settings → Download Clients: point at Deluge (host: dagda_deluge, port: 8112)
  # Root folder: /media/TV Shows
  # Remote path mapping: /media → /media (same mount, so no mapping needed)
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: dagda_sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/sonarr:/config
      - ${MEDIA_ROOT}:/media   # same mount as deluge — enables hardlinks
    ports:
      - "8989:8989"
    restart: unless-stopped
    networks:
      - dagda

  # ─── MOVIES ────────────────────────────────────────────────────────────────
  # Radarr monitors RSS feeds, grabs movies, renames and sorts them.
  # In Radarr settings → Download Clients: point at Deluge (host: dagda_deluge, port: 8112)
  # Root folder: /media/Movie
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: dagda_radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/radarr:/config
      - ${MEDIA_ROOT}:/media   # same mount as deluge — enables hardlinks
    ports:
      - "7878:7878"
    restart: unless-stopped
    networks:
      - dagda

  # ─── REQUEST UI ────────────────────────────────────────────────────────────
  # Overseerr: Netflix-style browse + request UI. Wife uses this to discover
  # and queue content. Requests auto-route to Sonarr (TV) or Radarr (movies).
  # Setup wizard runs on first visit — connect to Plex, then Sonarr + Radarr.
  overseerr:
    image: sctx/overseerr:latest
    container_name: dagda_overseerr
    environment:
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/overseerr:/app/config
    ports:
      - "5055:5055"
    restart: unless-stopped
    networks:
      - dagda

  # ─── AUDIOBOOKS ────────────────────────────────────────────────────────────
  # Audiobookshelf: hosts and streams audiobooks. Handles .aax (Audible DRM
  # after activation byte extraction), .mp3, .m4b. Family sharing built in.
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: dagda_audiobookshelf
    environment:
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/audiobookshelf:/config
      - ${CONFIG_ROOT}/audiobookshelf/metadata:/metadata
      - ${MEDIA_ROOT}/Audiobooks:/audiobooks
    ports:
      - "13378:80"
    restart: unless-stopped
    networks:
      - dagda

  # ─── REVERSE PROXY ─────────────────────────────────────────────────────────
  # Nginx Proxy Manager: GUI reverse proxy for LAN access via friendly names.
  # Admin UI: http://localhost:81
  # Default login: admin@example.com / changeme  (change immediately)
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: dagda_npm
    volumes:
      - ${CONFIG_ROOT}/npm:/data
      - ${CONFIG_ROOT}/npm/letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    restart: unless-stopped
    networks:
      - dagda

  # ─── STATIC ASSETS ─────────────────────────────────────────────────────────
  # Serves static files (logo, icons) over HTTP for Overseerr and other UIs.
  static:
    image: nginx:alpine
    container_name: dagda_static
    volumes:
      - ./static:/usr/share/nginx/html:ro
    ports:
      - "8088:80"
    restart: unless-stopped
    networks:
      - dagda

  # ─── PHOTOS ────────────────────────────────────────────────────────────────
  # Immich: self-hosted Google Photos replacement.
  # Upload library: /mnt/f/Immich/library  (managed by Immich)
  # External library: /mnt/f/GooglePhotosRefugees (read-only — Takeout/rclone dumps)
  # Web UI: http://localhost:2283  →  immich.dagda.local via NPM
  #
  # First run: visit :2283, create admin account, then:
  #   Settings → Libraries → Add External Library → /mnt/media/google
  immich-server:
    container_name: dagda_immich
    image: ghcr.io/immich-app/immich-server:release
    volumes:
      - ${IMMICH_UPLOAD_LOCATION}:/usr/src/app/upload
      - /mnt/f/GooglePhotosRefugees:/mnt/media/google:ro
      - /etc/localtime:/etc/localtime:ro
    env_file: .env
    environment:
      - DB_HOSTNAME=immich-postgres
      - REDIS_HOSTNAME=immich-redis
    ports:
      - "2283:2283"
    depends_on:
      - immich-redis
      - immich-postgres
    restart: unless-stopped
    networks:
      - dagda

  immich-machine-learning:
    container_name: dagda_immich_ml
    image: ghcr.io/immich-app/immich-machine-learning:release
    volumes:
      - immich-model-cache:/cache
    env_file: .env
    restart: unless-stopped
    networks:
      - dagda

  immich-redis:
    container_name: dagda_immich_redis
    image: docker.io/redis:6.2-alpine
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped
    networks:
      - dagda

  immich-postgres:
    container_name: dagda_immich_postgres
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums --auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
    volumes:
      - ${CONFIG_ROOT}/immich-db:/var/lib/postgresql/data
    healthcheck:
      test: >-
        pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" || exit 1;
        Chksum="$$(psql --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" --tuples-only --no-align
        --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM pg_stat_database')";
        echo "checksum failure count - $${Chksum}";
        [ "$${Chksum}" = '0' ] || exit 1
      interval: 5m
      start_interval: 30s
      start_period: 5m
    command: >-
      postgres
      -c shared_preload_libraries=vectors.so
      -c 'search_path="$$user", public, vectors'
      -c logging_collector=on
      -c max_wal_size=2GB
      -c shared_buffers=512MB
      -c wal_compression=on
    restart: unless-stopped
    networks:
      - dagda

  # ─── BACKUP ────────────────────────────────────────────────────────────────
  # Restic: encrypted nightly backup to Hetzner Object Storage.
  # Backs up: Immich library + postgres dump + service configs.
  # Schedule: 02:00 daily. Retention: 30 days.
  # Repo: s3:https://hel1.your-objectstorage.com/dagda-backup
  restic:
    image: mazzolino/restic:latest
    container_name: dagda-restic
    hostname: dagda
    restart: unless-stopped
    env_file: .env
    environment:
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      AWS_ACCESS_KEY_ID: ${RESTIC_S3_KEY}
      AWS_SECRET_ACCESS_KEY: ${RESTIC_S3_SECRET}
      BACKUP_CRON: "0 2 * * *"
      RESTIC_BACKUP_SOURCES: /data/immich-library /data/service-configs /backups/db
      RESTIC_BACKUP_ARGS: "--verbose"
      RESTIC_FORGET_ARGS: "--keep-daily 30 --prune"
      RUN_BEFORE_BACKUP: /hooks/pre-backup.sh
    volumes:
      - ${IMMICH_UPLOAD_LOCATION}:/data/immich-library:ro
      - ${CONFIG_ROOT}:/data/service-configs:ro
      - ./hooks:/hooks:ro
      - restic-backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - immich-postgres
    networks:
      - dagda

volumes:
  immich-model-cache:
  restic-backups:

networks:
  dagda:
    driver: bridge
