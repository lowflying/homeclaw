name: Terraform Apply

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply:
    name: terraform apply
    runs-on: ubuntu-latest
    environment: production  # approval gate configured in GitHub repo settings
    defaults:
      run:
        working-directory: infra/terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.HOS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.HOST_SECRET_KEY }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Remove stale volume from state (first-deploy cleanup)
        # The volume was partially created in nbg1 by a previous failed run.
        # Location is now hel1. prevent_destroy blocks destroy+recreate, so we
        # remove it from state and let Terraform create it fresh. Remove this
        # step once the first successful apply has completed.
        run: terraform state rm hcloud_volume.postgres_data || true

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Show Server IP
        run: terraform output -raw server_ipv4
