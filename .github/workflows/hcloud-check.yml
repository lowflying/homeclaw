name: HCloud Resource Check

on:
  workflow_dispatch:

jobs:
  check:
    name: Check Hetzner resource availability
    runs-on: ubuntu-latest

    steps:
      - name: Install hcloud CLI
        run: |
          curl -sSL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz | tar -xz
          sudo mv hcloud /usr/local/bin/

      - name: Delete orphaned postgres-data volume if unattached
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          VOL=$(hcloud volume list -o noheader | grep postgres-data || true)
          if [ -z "$VOL" ]; then
            echo "No postgres-data volume found, nothing to do."
            exit 0
          fi
          echo "Found volume: $VOL"
          SERVER=$(echo "$VOL" | awk '{print $4}')
          if [ "$SERVER" != "-" ]; then
            echo "Volume is attached to server $SERVER — skipping deletion to avoid data loss."
            exit 1
          fi
          ID=$(echo "$VOL" | awk '{print $1}')
          echo "Volume is unattached. Deleting volume $ID..."
          hcloud volume delete "$ID"
          echo "Deleted."

      - name: Final resource state
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          echo "=== Volumes ==="
          hcloud volume list
          echo "=== Servers ==="
          hcloud server list
